[General]
stressTestProgram = YCRUNCHER
runtimePerCore = 5m
suspendPeriodically = 1
coreTestOrder = Alternate
skipCoreOnError = 1
stopOnError = 0
numberOfThreads = 1
assignBothVirtualCoresForSingleThread = 0
# Fiskum IT: 2 - samme begrunnelse som YCRUNCHER_AUTO_1.ini - 2 runder gir bedre
# treffsjanse for Curve Optimizer-instabilitet uten a koste mye ekstra tid
maxIterations = 2
restartTestProgramForEachCore = 0
delayBetweenCores = 15
beepOnError = 0
flashOnError = 0
lookForWheaErrors = 1
treatWheaWarningAsError = 1

[yCruncher]
# Fiskum IT: "auto" er en TRYGG standardverdi her - y-cruncher sin egen CPU-deteksjon
# velger automatisk en AVX512-modus (f.eks. "22-ZN4 ~ Kizuna") pa en CPU som faktisk
# stotter det. For AMD Zen4/Zen5 overstyrer Activate-TestConfig denne verdien med en
# eksplisitt, bekreftet riktig modusstreng (se Get-UndervoltStotteInfo sin modellnummer-
# deteksjon) - "auto" brukes da kun som fallback hvis det skulle feile. Denne testen
# kjores ALDRI pa en CPU uten AVX512 i det hele tatt (se testplan.json sin
# kreverInstruksjonssett="AVX512" og Test-StottetAvCpu), sa risikoen i config.ini sin
# advarsel ("vil enten krasje eller ikke starte" pa ustottet maskinvare) gjelder ikke her
mode = auto
tests = BKT, BBP, SFTv4, SNT, SVT, FFTv4, N63, VT3
testDuration = 60
memory = Default
enableYCruncherLoggingWrapper = 1

################################################################

[AutomaticTestMode]
enableAutomaticAdjustment = 1
startValues = CurrentValues
maxValue = 0
incrementBy = Default
setVoltageOnlyForTestedCore = 1
voltageValueForNotTestedCores = 0
repeatCoreOnError = 1
enableResumeAfterUnexpectedExit = 0
waitBeforeAutomaticResume = 120
createSystemRestorePoint = 1
askForSystemRestorePointCreation = 0

[Logging]
name = CoreCycler
logLevel = 2
useWindowsEventLog = 1
flushDiskWriteCache = 0

[Update]
enableUpdateCheck = 0
updateCheckFrequency = 24

[Debug]
disableCpuUtilizationCheck = 0
useWindowsPerformanceCountersForCpuUtilization = 0
enableCpuFrequencyCheck = 0
tickInterval = 10
delayFirstErrorCheck = 0
stressTestProgramPriority = Normal
suspensionTime = 1000
modeToUseForSuspension = Threads
