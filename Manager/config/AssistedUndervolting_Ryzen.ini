# ============================================================================
# Fiskum IT - "Assistert undervolting" - CoreCycler Automatic Test Mode profil
# ============================================================================
#
# Hva denne profilen gjor:
#   For hver kjerne, en etter en (sekvensielt):
#     - Starter Curve Optimizer-verdien pa 0 (ingen undervolt)
#     - Sa lenge kjernen bestar testen uten feil: gjor verdien ETT hakk mer
#       aggressiv (0, -1, -2, -3, ...) og tester pa nytt
#     - Sa snart kjernen FEILER testen: verdien stilles ETT hakk tilbake
#       (mindre aggressiv, f.eks. -9 -> -8) og LASES der - testen gar videre
#       til neste kjerne
#   Andre kjerner enn den som testes for tiden far Curve Optimizer-verdi 0
#   (setVoltageOnlyForTestedCore = 1), slik at kun den aktive kjernen kan
#   forarsake en feil.
#
# Hvorfor disse innstillingene:
#   - yCruncher med testene SFTv4/FFTv4/N63 er sp00n sin egen anbefaling for
#     rask og sensitiv AVX/AVX2-feildeteksjon (samme valg som i
#     CoreCycler/configs/Ryzen.AutomaticTestMode.Start.ini)
#   - searchDirection = Decreasing er selve Fiskum IT-tillegget, se forklaring
#     i [AutomaticTestMode] under og i default.config.ini
#   - enableResumeAfterUnexpectedExit = 0: denne profilen bruker IKKE
#     CoreCyclers egen scheduled-task-gjenoppretting. FiskumIT-CoreCyclerManager
#     eier krasj-/stopp-/avslutningsgjenoppretting selv (les fra
#     CoreCycler/logs/fiskumit-offset-snapshot.json), og fortsetter testen
#     automatisk fra siste kjente kjerne/offset.
#
# Juster gjerne:
#   - incrementBy: stigningen per "hakk" (1 er forsiktig og noyaktig, men tar
#     lengre tid; 2-3 er raskere, men gir mindre presise grenseverdier)
#   - [yCruncher] testDuration / tests: bytt til et annet testprogram/varighet
#     hvis du heller vil bruke f.eks. Prime95 til selve undervolt-sokingen
#
# Ryzen 3000/5000-optimalisering: coreTestOrder = Alternate (i stedet for Default)
#   - For 12/16-kjerners modeller med 2 CCD-er (3900X/3950X/5900X/5950X) er dette
#     allerede det CoreCycler velger automatisk via "Default" (>8 fysiske kjerner),
#     men vi setter det explisitt her for a garantere CCD-fordelt varmebelastning
#     uavhengig av motorens fremtidige standardvalg
#   - For 6/8-kjerners enkelt-CCD-modeller (3600/3700X/3800X/5600X/5700X/5800X/5800X3D)
#     gir "Default" i stedet en TILFELDIG kjernerekkefolge per kjoring - "Alternate"
#     gjor sokerekkefolgen forutsigbar og lik fra gang til gang, lettere a folge i
#     loggen/offset-tabellen, uten noen ulempe siden det uansett bare finnes en CCD
[General]
stressTestProgram = YCRUNCHER
runtimePerCore = auto
coreTestOrder = Alternate
numberOfThreads = 1
maxIterations = 2
skipCoreOnError = 1
stopOnError = 0
beepOnError = 1
flashOnError = 1
lookForWheaErrors = 1
treatWheaWarningAsError = 1


[yCruncher]
mode = auto                 # Velger riktig binaer automatisk for prosessoren (f.eks. "19-ZN2 ~ Kagari" for Ryzen 5000)
tests = SFTv4, FFTv4, N63    # Begrenset til de mest belastende testene, for rask feildeteksjon
testDuration = 20            # 20 sekunder per test


[AutomaticTestMode]
enableAutomaticAdjustment = 1

# Fiskum IT: dette er det som gjor denne profilen til "Assistert undervolting"
# Se forklaringen i default.config.ini for searchDirection
searchDirection = Decreasing

# Start pa -1 - IKKE Minimum - sok skal ga NEDOVER fra null. Dette gjelder kun den
# ALLERFORSTE gangen denne profilen kjores (eller etter "Nullstill" i Manageren) - sa
# lenge en gyldig offset-snapshot finnes fra en tidligere kjoring (samme sok, et krasj
# midt i soket, eller faktisk hvilken som helst tidligere Automatic Test Mode-kjoring),
# foretrekker motoren ALLTID den i stedet, se Get-FiskumOffsetSnapshotValues i
# script-corecycler.ps1. Det er det som gjor at et krasj midt i soket gjenopptar fra
# riktig kjerne/verdi i stedet for a starte alle kjerner pa -1 igjen
startValues = -1

# Ovre grense (0 = ingen overvolting)
maxValue = 0

# Sikkerhetsgrense nedover: soket stopper og laser kjernen her selv om testen aldri
# rapporterer feil ved ekstreme verdier. -30 er den dokumenterte minimumsverdien for
# Curve Optimizer pa Ryzen 5000/6000 (se default.config.ini for detaljer). Fiskum IT
# CoreCyclerManager patcher denne verdien automatisk til -50 for Ryzen 7000 og nyere
# (se Activate-TestConfig/Get-UndervoltStotteInfo i Manager-scriptet) - verdien her er
# kun standardverdien for filen slik den ligger pa disk.
minValue = -30

# ----------------------------------------------------------------------------------
# Fiskum IT - hvilke CPU-er far faktisk lov til a bruke denne profilen (nettsok):
#   Curve Optimizer krever AMD Zen 3 (CPUID Family 19h) eller nyere - Zen/Zen+/Zen 2
#   (Family 17h) har det IKKE. Modellnummeret ALENE ("5000 eller nyere") er IKKE til
#   a stole pa for bærbare CPU-er: AMD har solgt ekte Zen 2-silisium under BADE
#   "Ryzen 5000"-serien ("Lucienne": Ryzen 3 5300U/Ryzen 5 5500U/Ryzen 7 5700U) OG
#   "Ryzen 7000"-serien ("Mendocino": Ryzen 3 7320U/Ryzen 5 7520U m.fl.) - til
#   forveksling like modellnumre som ekte Zen 3/Zen 4-brikker i samme serie. Fiskum
#   IT CoreCyclerManager sjekker derfor CPUID Family (fra WMI), ikke bare modell-
#   nummeret, for a avgjore om denne profilen i det hele tatt tilbys i UI'et - se
#   Get-UndervoltStotteInfo. Stasjonaere Ryzen-CPU-er er IKKE kjent rammet av denne
#   navngivningsforvirringen (kun den bærbare U/H-serien).
# ----------------------------------------------------------------------------------

# Stigningen per "hakk", bade nedover (ved suksess) og tilbake (ved feil)
incrementBy = 1

# Bare den aktive kjernen far avvikende Curve Optimizer-verdi, resten settes til 0
setVoltageOnlyForTestedCore = 1
voltageValueForNotTestedCores = 0

# Las kjernen ved forste feil og ga videre til neste - IKKE gjenta (gjentakelse
# under sok nedover styres av suksess-grenen i motoren, se script-corecycler.ps1)
repeatCoreOnError = 0

# Fiskum IT Manager eier gjenoppretting selv (se toppkommentaren), ikke CoreCyclers
# innebygde scheduled-task-system
enableResumeAfterUnexpectedExit = 0
waitBeforeAutomaticResume = 120

# Lag et gjenopprettingspunkt for Windows for vi starter - undervolt-soking kan
# i sjeldne tilfeller gi en ustabil installasjon
createSystemRestorePoint = 1
askForSystemRestorePointCreation = 0


[Logging]
name = CoreCycler
logLevel = 2
useWindowsEventLog = 1
flushDiskWriteCache = 0


[Update]
enableUpdateCheck = 0
updateCheckFrequency = 24


[Debug]
disableCpuUtilizationCheck = 0
useWindowsPerformanceCountersForCpuUtilization = 0
enableCpuFrequencyCheck = 0
tickInterval = 10
delayFirstErrorCheck = 0
stressTestProgramPriority = Normal
suspensionTime = 1000
modeToUseForSuspension = Threads
