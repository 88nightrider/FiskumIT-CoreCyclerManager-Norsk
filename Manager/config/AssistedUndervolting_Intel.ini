# ============================================================================
# Fiskum IT - "Assistert undervolting" (Intel) - CoreCycler Automatic Test Mode profil
# ============================================================================
#
# VIKTIG - les dette for du bruker denne profilen:
#   Intel-CPUer har INGEN per-kjerne spenningskontroll slik AMD Ryzen har med Curve
#   Optimizer. IntelVoltageControl (CoreCycler\tools\IntelVoltageControl\) setter EN
#   global spenningsforskyvning for HELE CPU-en (pluss en lenket cache-plan) via MSR
#   0x150. Soket her er derfor IKKE per kjerne som i AssistedUndervolting_Ryzen.ini -
#   ALLE kjerner testes med SAMME verdi samtidig, og soket stopper sa snart EN ENKELT
#   kjerne feiler. Det finnes ingen mate a undervolte enkeltkjerner uavhengig av
#   hverandre pa Intel med dette verktoyet.
#
#   IKKE GARANTERT A FUNGERE: mange Intel-systemer fra ca. 2021 og nyere later MSR
#   0x150-skriving i BIOS som sikring mot "Plundervolt"-svakheten. Dette kan IKKE
#   oppdages pa forhand - du ma faktisk prove. Noen BIOS-er har et alternativ for a
#   sla opp denne sikringen (ofte kalt "CFG Lock" / "Overclocking Lock" - se BIOS-
#   produsentens dokumentasjon), andre tillater det ikke i det hele tatt.
#
#   IntelVoltageControl sin egen dokumentasjon bekrefter eksplisitt kun "Skylake og
#   avledede" (ca. 6.-10. generasjon: Skylake/Kaby Lake/Coffee Lake/Comet Lake).
#   Nyere hybrid-arkitekturer (Alder Lake/Raptor Lake/Meteor Lake+ med bade P- og
#   E-kjerner) er IKKE eksplisitt dekket av verktoyets dokumentasjon - en og samme
#   spenningsforskyvning kan i prinsippet treffe P- og E-kjerner ulikt, siden de har
#   forskjellige spenningskarakteristikker. Vaer ekstra forsiktig og bruk korte
#   testperioder/smaa steg pa slike CPUer.
#
# GENERASJON-FOR-GENERASJON (Fiskum IT, basert pa nettsok - se Get-UndervoltStotteInfo
# i Manager-scriptet, som bruker samme inndeling for "CPU oppdaget"-meldingen i UI'et):
#   - 4.-9. gen (Haswell t.o.m. Coffee Lake, ca. 2013-2019): historisk mest palitelig
#     for denne metoden. Plundervolt ble offentliggjort desember 2019 og pavirket disse
#     generasjonene i utgangspunktet, men later ofte forst pa OEM-baerbare som har fatt
#     SENERE BIOS-oppdateringer spesifikt for a stenge hullet
#   - 10. gen (Ice Lake/Comet Lake, 2019-2020): Plundervolt-sikringer begynte a laase
#     dette pa mange baerbare modeller herfra, spesielt OEM (Dell/HP/Lenovo m.fl. har
#     patchet eksisterende maskiner i ettertid). Stasjonaere Comet Lake-modeller mindre
#     pavirket
#   - 11. gen (Rocket Lake/Tiger Lake, 2020-2021): mobile Tiger Lake-modeller har ifolge
#     flere kilder ofte spenningsjustering fullstendig last av Intel selv, UTEN at OEM
#     eller bruker kan lase opp igjen. Stasjonaere Rocket Lake-hovedkort er mer apne
#   - 12.-14. gen (Alder Lake/Raptor Lake, 2021-2024): varierer sterkt per hovedkort -
#     "CFG Lock" star apen (= ulast) som standard pa en del entusiast Z-hovedkort, men
#     IKKE alle, og enkelte BIOS-versjoner skjuler innstillingen helt. Det er ogsa kjent
#     (bekreftet av Intel selv i 2024, i forbindelse med 13./14. gen-stabilitetsproblemer)
#     at undervolting/spenningsbegrensning kan forbedre stabiliteten pa disse CPU-ene -
#     men den i praksis vanligste metoden i dag er a sette spenningsforskyvning DIREKTE
#     i BIOS/UEFI-oppsettet (permanent, overlever omstart), ikke en kjorende-Windows-
#     verktoy som dette. Hvis denne profilen ikke fungerer, er BIOS-innstillinger et
#     bedre forsteforsok for disse generasjonene
#   - 15.+ gen / nyere enn Raptor Lake: for nytt til at det finnes utbredt dokumentasjon
#     om denne spesifikke MSR-baserte metoden - ukjent, prov selv
#   - Baerbare modeller (suffiks U/Y/H/HX, eller G* for Ice Lake-mobil) er i ALLE
#     generasjoner mer utsatt for last spenningskontroll enn stasjonaere - OEM-
#     produsenter later dette langt oftere enn entusiast-hovedkortprodusenter
#
#   INGEN KJENT SIKKER MINIMUMSVERDI: i motsetning til AMD (dokumentert -30/-50 for
#   Curve Optimizer) finnes det ingen offisiell/dokumentert sikker minimumsgrense for
#   Intel sin spenningsforskyvning - den varierer sterkt med CPU-modell, silisium og
#   hovedkort. "minValue" under er en KONSERVATIV, erfaringsbasert startverdi hentet
#   fra generelle community-veiledninger for Intel-undervolting, IKKE en garantert
#   trygg grense. Juster ned/opp basert pa din egen research for din spesifikke CPU.
#
# Hva denne profilen gjor:
#   - Starter spenningsforskyvningen pa 0 (ingen undervolt)
#   - Sa lenge ALLE kjerner bestar testen uten feil: gjor verdien ETT hakk mer
#     aggressiv (0, -5, -10, -15mV, ...) og tester pa nytt
#   - Sa snart EN kjerne feiler testen: verdien stilles ETT hakk tilbake og LASES der
#   - Siden det bare finnes EN verdi (ikke en per kjerne), er soket fullfort etter
#     forste laste verdi - det er ingen "neste kjerne" a ga til
#
# Juster gjerne:
#   - incrementBy: 5mV per hakk er en vanlig brukt steglengde - reduser til 1-2mV for
#     mer presisjon (tar lengre tid), eller hev for raskere (men mindre noyaktig) sok
#   - minValue: se advarselen over - dette er IKKE en dokumentert trygg grense
#   - [yCruncher] testDuration / tests: samme testvalg som AssistedUndervolting_Ryzen.ini,
#     da disse testene er like AVX/AVX2-sensitive uavhengig av CPU-produsent
[General]
stressTestProgram = YCRUNCHER
runtimePerCore = auto
coreTestOrder = Alternate
numberOfThreads = 1
maxIterations = 2
skipCoreOnError = 1
stopOnError = 0
beepOnError = 1
flashOnError = 1
lookForWheaErrors = 1
treatWheaWarningAsError = 1


[yCruncher]
mode = auto                 # Velger riktig binaer automatisk for prosessoren
tests = SFTv4, FFTv4, N63    # Begrenset til de mest belastende testene, for rask feildeteksjon
testDuration = 20            # 20 sekunder per test


[AutomaticTestMode]
enableAutomaticAdjustment = 1

# Fiskum IT: dette er det som gjor denne profilen til "Assistert undervolting"
# Se forklaringen i default.config.ini for searchDirection
searchDirection = Decreasing

# Start pa -5 - IKKE Minimum ("Minimum" stottes ikke for Intel, se default.config.ini.
# Sa lenge en gyldig offset-snapshot finnes fra en tidligere kjoring, foretrekker
# motoren ALLTID den i stedet - se Get-FiskumOffsetSnapshotValues i script-corecycler.ps1
startValues = -5

# Ovre grense (0 = ingen overvolting)
maxValue = 0

# Sikkerhetsgrense nedover - se VIKTIG-advarselen i toppen av denne filen. -150mV er en
# konservativ, IKKE offisielt dokumentert, erfaringsbasert startverdi
minValue = -150

# Stigningen per "hakk" i millivolt, bade nedover (ved suksess) og tilbake (ved feil)
incrementBy = 5

# Fiskum IT: ingen reell effekt for Intel (motoren setter alltid SAMME verdi for alle
# kjerner uansett, se Set-IntelVoltageOffset/script-corecycler.ps1), men satt for
# konsistens med AssistedUndervolting_Ryzen.ini
setVoltageOnlyForTestedCore = 1
voltageValueForNotTestedCores = 0

# Las ved forste feil - IKKE gjenta (gjentakelse under sok nedover styres av
# suksess-grenen i motoren, se script-corecycler.ps1)
repeatCoreOnError = 0

# Fiskum IT Manager eier gjenoppretting selv (se toppkommentaren), ikke CoreCyclers
# innebygde scheduled-task-system
enableResumeAfterUnexpectedExit = 0
waitBeforeAutomaticResume = 120

# Lag et gjenopprettingspunkt for Windows for vi starter - undervolt-soking kan
# i sjeldne tilfeller gi en ustabil installasjon
createSystemRestorePoint = 1
askForSystemRestorePointCreation = 0


[Logging]
name = CoreCycler
logLevel = 2
useWindowsEventLog = 1
flushDiskWriteCache = 0


[Update]
enableUpdateCheck = 0
updateCheckFrequency = 24


[Debug]
disableCpuUtilizationCheck = 0
useWindowsPerformanceCountersForCpuUtilization = 0
enableCpuFrequencyCheck = 0
tickInterval = 10
delayFirstErrorCheck = 0
stressTestProgramPriority = Normal
suspensionTime = 1000
modeToUseForSuspension = Threads
